# Keeps the site in sync with the source docs (README, AgentProof, ROADMAP,
# package.json). Runs on push to main when any of those files change, updates
# the fallback values in site/repo-data.js and the engineBase line in
# site/index.html, regenerates the repo snapshot so the Merkle gate stays green,
# and commits the result if anything changed. The pages.yml deploy then triggers
# automatically on the commit.
name: sync-site-data

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "ROADMAP.md"
      - "agentproof/README.md"
      - "package.json"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Sync site data from source docs
        run: node scripts/sync-site-data.mjs
      - name: Regenerate snapshot if site changed
        run: |
          if ! git diff --quiet site/; then
            node scripts/snapshot.mjs .
          fi
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet site/ .modonome/snapshot/; then
            echo "No changes to commit."
          else
            git add site/index.html site/repo-data.js .modonome/snapshot/
            git commit -m "chore: sync site data from source docs"
            git push
          fi
