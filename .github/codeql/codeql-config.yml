name: "CodeQL config"

# site/support.js is GENERATED code (dc-runtime/src/*.ts → bun run build).
# It intentionally executes user-supplied design-component scripts inside a
# sandboxed browser context, so new Function(), innerHTML assignments, and
# fetch() of user-provided URLs are by design. Suppressing per-file keeps the
# alert list actionable for the hand-written source files.
# site/index.html uses a custom template attribute syntax, onClick="{{ expr }}",
# consumed by the DC runtime in support.js (never executed as an inline browser
# event handler). CodeQL's HTML extractor parses the mustache placeholder as
# literal inline JavaScript, where "{{ x.y }}" is valid JS: two nested block
# statements around the bare expression statement "x.y", which correctly has
# no effect as JS since it is never JS. This idiom appears throughout the file
# by design, so it is suppressed per-file rather than per-line.
query-filters:
  - exclude:
      id: js/useless-expression
      paths:
        - "site/index.html"
  - exclude:
      id: js/code-injection
      paths:
        - "site/support.js"
  - exclude:
      id: js/eval-call
      paths:
        - "site/support.js"
  - exclude:
      id: js/xss-through-dom
      paths:
        - "site/support.js"
  - exclude:
      id: js/prototype-pollution
      paths:
        - "site/support.js"
  - exclude:
      id: js/unsafe-external-link
      paths:
        - "site/support.js"
  - exclude:
      id: js/remote-property-injection
      paths:
        - "site/support.js"
