# Modonome configuration. Safe defaults. Edit with care.
# The arming levers (autonomy_enabled, auto_merge, max_merges_per_day,
# repo_network_enabled) are read from the environment or CI in armed mode, so
# this file alone can never arm the engine.
schema_version: 1

autonomy_enabled: false
dry_run: true
auto_merge: false

max_attempts_per_item: 3
max_open_prs: 3
max_diff_lines: 400
lease_minutes: 60
max_merges_per_day: 0

remote_model_budget_usd_per_day: 0
local_model_only_by_default: true

require_branch_protection: true
require_codeowner_review: true
require_distinct_maker_checker: true
require_distinct_maker_checker_model: true

trusted_author_allowlist: []
# The version field in package.json is agent-protected: only chore(release): commits
# from scripts/release.mjs may change it. check-repo-hygiene.mjs enforces this on PRs.
protected_paths_extra: [bin/, prompts/, schemas/, scripts/, templates/, .github/, site/]
state_dir: .modonome

market_scan_enabled: false
owner_approval_required_for_new_claims: true

repo_network_enabled: false
repo_network_dry_run: true
share_raw_code_across_repos: false
share_repo_identifiers_by_default: false

# Governed Remediation (ADR-035): arm the metadata-only commit-history remediator's
# apply step (scripts/remediate.mjs). Off by default and capability-gated. Even with the
# engine armed (autonomy_enabled + MODONOME_ARMED), apply stays disabled until this is
# true. Rewriting history is reserved for an owner-approved promotion backed by evidence.
remediation_apply_enabled: false

# Snapshot utility levers. Host admins tune these. ci_mode warn keeps a stale
# snapshot from failing CI; fail makes the freshness gate blocking. Modonome runs
# fail on itself (dogfooding) while the shipped template default stays warn.
snapshot:
  ci_mode: fail
  sign: false
  parser: heuristic
  token_budget: 120000
  strict_redact: false

# Runner and model assignment for cost-bearing agent roles (WS-H). Defaults keep
# every paid role on the container runner with hosted Claude models, matching
# current behavior. Flip a role to the local runner or a local model to move spend
# onto self-hosted hardware. require_distinct_maker_checker_model is enforced across
# hosted and local models alike.
roles:
  maker:
    runner: container
    model: claude-sonnet-4-6
  checker:
    runner: container
    model: claude-opus-4-8
  self-govern:
    runner: container
    model: claude-haiku-4-5-20251001
  # Researcher agent (ADR-039, wired into the loop by WI-042). It is NOT on the
  # active role_sequence (maker -> checker), so a plain run-cycle invocation still
  # runs just the pair; run it on its own schedule with
  # `node scripts/agent/run-cycle.mjs --roles researcher --execute`, or add it to
  # role_sequence to run every cycle alongside maker/checker. models is a priority
  # list: the paid frontier choice first, falling back to the free/local one when
  # no daily budget is set.
  researcher:
    runner: container
    models: [claude-opus-4-8, local-default]
    skills: [cite-sources, summarize-findings]
    tools: [web-search, read-only-fs]
  # Envisioner agent (ADR-039/ADR-040, Milestone 5). Proposes scoped innovation
  # candidates grounded in an owner-approved direction (DECISIONS.md, ROADMAP.md),
  # gated the same way the researcher is: an independent check at
  # scripts/agent/review-proposals.mjs before anything reaches the backlog. NOT on
  # the active role_sequence; run it on its own schedule with
  # `node scripts/agent/run-cycle.mjs --roles envisioner --execute`.
  envisioner:
    runner: container
    models: [claude-opus-4-8, local-default]
    skills: [strategic-ideation, prioritization]
    tools: [read-only-fs]
    schedule:
      cron: '0 6 * * 1'
  # Market-researcher agent (ADR-039/ADR-040, Milestone 5). Named "marketresearcher"
  # (no hyphen) because scripts/agent/render-prompt.mjs requires a role name that
  # matches ^[a-z]+$. Off by default: gated by market_scan_enabled (false above),
  # so a scheduled run exits without a model call until an owner opts in. Findings
  # are sourced and paraphrased only, never raw scraped content.
  marketresearcher:
    runner: container
    models: [claude-haiku-4-5-20251001, local-default]
    skills: [cite-sources, summarize-findings]
    tools: [web-search, read-only-fs]
    schedule:
      cron: '0 7 * * 1'
runners:
  local:
    labels: [self-hosted, mac-mini]
    cli_path: claude
  container:
    labels: [ubuntu-latest]
    cli_path: claude
models:
  claude-sonnet-4-6:
    provider: anthropic
  claude-opus-4-8:
    provider: anthropic
  claude-haiku-4-5-20251001:
    provider: anthropic
  local-default:
    provider: local
    base_url: http://mac-mini.local:11434
  # Off-by-default example: a free-tier gateway model. Uncomment and reference it
  # from a role's `model:` to run at zero cost (free cost class, no budget needed).
  # gh-gpt-4o-mini:
  #   provider: github-models
  # Off-by-default example: a paid frontier model from another vendor via an
  # OpenAI-compatible endpoint. Using this requires raising
  # remote_model_budget_usd_per_day above 0 and arming the engine; it is billable.
  # frontier-gpt:
  #   provider: openai-compatible
  #   base_url: https://api.openai.com/v1

# Provider registry override/extension. The built-in registry
# (scripts/agent/providers.mjs) already covers anthropic/local/github-models/
# openai-compatible; add an entry here only to redefine a provider's transport,
# cost class, or auth env var for this repo. The entry below restates the
# github-models built-in verbatim (no-op) so this map has a concrete example.
providers:
  github-models:
    costClass: free
